name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test-db image
        run: docker build -f Dockerfile.postgres -t partymap-test-db .

      - name: Start test database
        run: |
          docker run -d \
            --name test-db \
            -e POSTGRES_USER=partymap \
            -e POSTGRES_PASSWORD=password \
            -e POSTGRES_DB=partymap \
            -p 5432:5432 \
            partymap-test-db

      - name: Wait for database
        run: |
          for i in {1..30}; do
            if docker exec test-db pg_isready -U partymap -d partymap; then
              echo "Database is ready"
              exit 0
            fi
            echo "Waiting for database... ($i/30)"
            sleep 1
          done
          echo "Database failed to start"
          exit 1

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        env:
          DATABASE_URL: postgresql://partymap:password@localhost:5432/partymap
          FLASK_ENV: testing
          SECRET_KEY: test-secret-key-for-ci-only
          GMAPS_API_KEY: test-gmaps-key
        run: uv run pytest tests/ --tb=short -q

      - name: Cleanup database
        if: always()
        run: docker stop test-db && docker rm test-db

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run black check
        run: uv run black --check .
