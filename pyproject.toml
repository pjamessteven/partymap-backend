[project.optional-dependencies]
dev = [
    # Testing
    "pytest>=8.0.0",
    "pytest-flask>=1.3.0",
    "pytest-timeout>=2.0.0",
    "testing-postgresql>=1.3.0",
    "testing-common-database>=2.0.3",

    # Linting & Formatting
    "black>=24.0.0",
    "flake8>=7.0.0",
    "mccabe>=0.7.0",
    "pycodestyle>=2.11.0",
    "pyflakes>=3.2.0",

    # Type Checking
    "mypy-extensions>=1.0.0",
    "typing-extensions>=4.12.0",

    # Utilities
    "autopep8>=2.0.0",
    "iniconfig>=2.0.0",
    "packaging>=24.0",
    "pyparsing>=3.1.0",
    "toml>=0.10.2",
    "pluggy>=1.5.0",
    "pathspec>=0.12.0",

    # Virtual Env
    "virtualenv>=20.25.0",
    "virtualenv-clone>=0.5.7",
    "distlib>=0.3.8",
    "filelock>=3.13.0",
    "pipenv>=2023.0.0",
]

[dependency-groups]
dev = [
    "pytest>=6.2.3",
    "pytest-flask>=1.2.0",
    "black>=20.8b1",
    "flake8>=3.8.3",
    "pip-audit>=2.5.4",
    "pytest-cov>=7.1.0",
]

[project.scripts]
pmapi = "manage:manager.run"

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.uv]
package = false

[tool.uv.pip]
universal = true

[tool.setuptools]
py-modules = []

[tool.black]
line-length = 100
target-version = ['py312']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  migrations
  | .venv
  | __pycache__
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [
    ".venv",
    "migrations",
    "__pycache__",
    ".git",
    ".pytest_cache",
    ".ruff_cache",
]

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "F",  # Pyflakes
    "I",  # isort
    "N",  # pep8-naming
    "W",  # pycodestyle warnings
]
ignore = ["E501"]  # Line too long (handled by black)

[tool.ruff.lint.pydocstyle]
convention = "google"
