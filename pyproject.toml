[project]
name = "pmapi"
version = "1.0.0"
description = "PartyMap API - Event discovery and management platform"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
authors = [
    {name = "Peter Steven", email = "info@partymap.com"}
]
keywords = ["flask", "api", "events", "parties", "music"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Framework :: Flask",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
]

